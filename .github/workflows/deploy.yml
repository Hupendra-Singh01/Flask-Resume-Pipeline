# This workflow automates the deployment of the Flask Resume Pipeline application to a self-hosted server whenever changes are pushed to the main branch. It checks out the code, sets up a Python environment, installs dependencies, and uses PM2 to manage the application process.

name: Deploy Flask Resume Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn

      - name: Deploy with PM2
        run: |
          source venv/bin/activate
          # The fix is adding '--interpreter none' to the start command
          pm2 restart "flask-resume-app" || pm2 start venv/bin/gunicorn --name "flask-resume-app" --interpreter none -- --bind 0.0.0.0:5000 app:app
          
      - name: Save PM2 State
        run: pm2 save